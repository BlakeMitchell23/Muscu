<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f5fa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MuscuTrack</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header class="app-header">
    <div class="app-logo">MuscuTrack</div>
    <div class="app-stats">
      <span class="stat-value" id="stat-sessions">0</span> séances <span class="stat-sep">&middot;</span> <span class="text-muted" id="stat-next"></span>
    </div>
  </header>

  <!-- TAB: ACCUEIL -->
  <div class="tab-content active" id="tab-accueil">
    <h1 class="page-title">Accueil</h1>

    <div class="card">
      <div class="card-header">
        <span class="card-title" style="margin:0">Ma tendance</span>
        <select class="seg-select" id="trend-select"></select>
      </div>
      <div class="chart-box"><canvas id="trend-chart"></canvas></div>
      <div class="trend-stats" id="trend-stats"></div>
    </div>

    <div id="next-session-card"></div>

    <div class="card">
      <div class="card-header">
        <span class="card-title" style="margin:0">Historique récent</span>
        <button class="btn-pill" id="btn-voir-tout">Voir tout</button>
      </div>
      <div class="sessions-history" id="recent-history"></div>
    </div>

    <div class="card">
      <span class="card-title">Progression par exercice</span>
      <div class="table-scroll"><table class="progress-table" id="progress-table"></table></div>
    </div>
  </div>

  <!-- TAB: SÉANCE -->
  <div class="tab-content" id="tab-seance">
    <div id="seance-screen1">
      <h1 class="page-title">Séance</h1>
      <div class="seance-meta-row">
        <input type="date" class="form-input seance-date-input" id="f-session-date">
        <div class="energy-selector" id="energy-selector"></div>
      </div>
      <div id="seance-cards"></div>
      <div class="seance-libre-link" id="btn-seance-libre">Séance libre</div>
      <div class="card" style="margin-top:18px">
        <span class="card-title">Historique</span>
        <div class="sessions-history" id="sessions-history"></div>
      </div>
    </div>
    <div id="seance-screen2" class="seance-screen2 hidden">
      <div class="seance-header">
        <button class="seance-back-btn" id="seance-back">&larr;</button>
        <span class="seance-header-title" id="seance-title">Session A</span>
        <span class="seance-header-badge" id="seance-badge"></span>
      </div>
      <div id="seance-exercises-list"></div>
      <button type="button" class="btn-pill seance-add-exo" id="btn-seance-add-exo">+ Exercice</button>
      <div class="seance-save-spacer"></div>
      <button type="button" class="btn-primary seance-save-btn" id="btn-seance-save">Enregistrer</button>
    </div>
  </div>

  <!-- TAB: ENCYCLOPÉDIE -->
  <div class="tab-content" id="tab-encyclopedie">
    <h1 class="page-title">Encyclopédie</h1>

    <div class="card card-gradient">
      <span class="card-title">Mon profil</span>
      <dl class="profile-grid" id="profile-grid"></dl>
    </div>

    <div class="card">
      <span class="card-title">Mon corps</span>
      <div class="body-container">
        <div class="seg-control" id="body-toggle">
          <button class="seg-btn active" data-view="front">Face</button>
          <button class="seg-btn" data-view="back">Dos</button>
        </div>
        <div class="body-model-wrapper" id="body-model-root">
          <div class="body-loading"><div class="spinner"></div></div>
        </div>
        <div class="body-legend" id="body-legend"></div>
      </div>
    </div>

    <div class="card">
      <span class="card-title">Catalogue d'exercices</span>
      <div id="exercises-catalog"></div>
    </div>

    <div id="science-content"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="accueil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 14 15 14 15 21"/></svg>
      <span>Accueil</span>
      <div class="tab-dot"></div>
    </button>
    <button class="tab-btn" data-tab="seance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="6" y="6" width="3" height="12" rx="1"/><rect x="15" y="6" width="3" height="12" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      <span>Séance</span>
      <div class="tab-dot"></div>
    </button>
    <button class="tab-btn" data-tab="encyclopedie">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span>Encyclopédie</span>
      <div class="tab-dot"></div>
    </button>
  </nav>

  <!-- PANELS -->
  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="panel" id="panel"></div>
  <div class="toast" id="toast"></div>

  <!-- CHECKMARK OVERLAY -->
  <div class="checkmark-overlay" id="checkmark-overlay">
    <svg class="checkmark-svg" viewBox="0 0 52 52"><circle cx="26" cy="26" r="25" fill="none" stroke="var(--green)" stroke-width="2"/><path fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg>
  </div>

  <datalist id="exercise-names"></datalist>
  <datalist id="muscle-groups"></datalist>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
