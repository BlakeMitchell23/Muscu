<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MuscuTrack</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="app-logo">MuscuTrack</div>
    <div class="app-stats">
      <span class="stat-value" id="stat-sessions">17</span> seances
    </div>
  </header>

  <!-- TAB: PROGRESSION (home) -->
  <div class="tab-content active" id="tab-progression">
    <h1 class="page-title">Progression</h1>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Charges</span>
        <select class="seg-select" id="exercise-select"></select>
      </div>
      <div class="chart-box"><canvas id="progression-chart"></canvas></div>
    </div>
    <div class="card">
      <span class="card-title">Progression par exercice</span>
      <div class="table-scroll"><table class="progress-table" id="progress-table"></table></div>
    </div>
  </div>

  <!-- TAB: SÉANCE -->
  <div class="tab-content" id="tab-seance">
    <!-- Écran 1 : Choix de la séance -->
    <div id="seance-screen1">
      <h1 class="page-title">Séance</h1>
      <div class="seance-meta-row">
        <input type="date" class="form-input seance-date-input" id="f-session-date">
        <div class="energy-selector" id="energy-selector"></div>
      </div>
      <div id="seance-cards"></div>
      <div class="seance-libre-link" id="btn-seance-libre">Séance libre</div>
      <div class="card" style="margin-top:18px">
        <span class="card-title">Historique</span>
        <div class="sessions-history" id="sessions-history"></div>
      </div>
    </div>
    <!-- Écran 2 : Saisie rapide -->
    <div id="seance-screen2" class="seance-screen2 hidden">
      <div class="seance-header">
        <button class="seance-back-btn" id="seance-back">←</button>
        <span class="seance-header-title" id="seance-title">Session A</span>
        <span class="seance-header-badge" id="seance-badge"></span>
      </div>
      <div id="seance-exercises-list"></div>
      <button type="button" class="btn-pill seance-add-exo" id="btn-seance-add-exo">+ Ajouter un exercice</button>
      <div class="seance-save-spacer"></div>
      <button type="button" class="btn-primary seance-save-btn" id="btn-seance-save">Enregistrer la séance</button>
    </div>
  </div>

  <!-- TAB: EXERCICES -->
  <div class="tab-content" id="tab-exercices">
    <h1 class="page-title">Exercices</h1>
    <div id="exercises-catalog"></div>
  </div>

  <!-- TAB: SCIENCE -->
  <div class="tab-content" id="tab-science">
    <h1 class="page-title">Science & Profil</h1>
    <div class="card card-gradient">
      <span class="card-title">Mon profil</span>
      <dl class="profile-grid" id="profile-grid"></dl>
    </div>
    <div class="card">
      <span class="card-title">Mon corps</span>
      <div class="body-container">
        <div class="seg-control" id="body-toggle">
          <button class="seg-btn active" data-view="front">Face</button>
          <button class="seg-btn" data-view="back">Dos</button>
        </div>
        <div class="body-model-wrapper" id="body-model-root">
          <div class="body-loading"><div class="spinner"></div></div>
        </div>
        <div class="body-legend" id="body-legend"></div>
      </div>
    </div>
    <div id="science-content"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="progression">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progrès</span>
    </button>
    <button class="tab-btn" data-tab="seance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="6" y="6" width="3" height="12" rx="1"/><rect x="15" y="6" width="3" height="12" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      <span>Séance</span>
    </button>
    <button class="tab-btn" data-tab="exercices">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Exercices</span>
    </button>
    <button class="tab-btn" data-tab="science">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Science</span>
    </button>
  </nav>

  <!-- PANELS -->
  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="panel" id="panel"></div>
  <div class="toast" id="toast"></div>

  <datalist id="exercise-names"></datalist>
  <datalist id="muscle-groups"></datalist>

  <script src="data.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
