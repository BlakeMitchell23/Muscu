<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MuscuTrack</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="app-logo">MuscuTrack</div>
    <div class="app-stats">
      <span class="stat-value" id="stat-sessions">17</span> seances
    </div>
  </header>

  <!-- TAB: PROGRESSION (home) -->
  <div class="tab-content active" id="tab-progression">
    <h1 class="page-title">Progression</h1>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Charges</span>
        <select class="seg-select" id="exercise-select"></select>
      </div>
      <div class="chart-box"><canvas id="progression-chart"></canvas></div>
    </div>
    <div class="card">
      <span class="card-title">Progression par exercice</span>
      <div class="table-scroll"><table class="progress-table" id="progress-table"></table></div>
    </div>
  </div>

  <!-- TAB: PLANNING -->
  <div class="tab-content" id="tab-planning">
    <h1 class="page-title">Planning</h1>
    <div class="week-pills" id="week-pills"></div>
    <div class="planning-header" id="planning-header"></div>
    <div id="planning-sessions"></div>
  </div>

  <!-- TAB: EXERCICES -->
  <div class="tab-content" id="tab-exercices">
    <h1 class="page-title">Exercices</h1>
    <div id="exercises-catalog"></div>
  </div>

  <!-- TAB: AJOUTER -->
  <div class="tab-content" id="tab-add">
    <h1 class="page-title">Ajouter une seance</h1>
    <div class="card">
      <form id="session-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group"><label class="form-label">N° seance</label><input type="number" class="form-input" id="f-session-num" min="1"></div>
          <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="f-session-date"></div>
        </div>
        <div class="form-group"><label class="form-label">Energie</label><div class="energy-selector" id="energy-selector"></div></div>
        <div class="sep"></div>
        <div class="flex-between mb-12"><span class="card-title" style="margin:0">Exercices</span><button type="button" class="btn-pill" id="btn-add-exercise">+ Ajouter</button></div>
        <div id="exercises-form-list"></div>
        <button type="submit" class="btn-primary btn-block">Enregistrer</button>
      </form>
    </div>
    <div class="card">
      <span class="card-title">Historique</span>
      <div class="sessions-history" id="sessions-history"></div>
    </div>
  </div>

  <!-- TAB: SCIENCE -->
  <div class="tab-content" id="tab-science">
    <h1 class="page-title">Science & Profil</h1>
    <div class="card card-gradient">
      <span class="card-title">Mon profil</span>
      <dl class="profile-grid" id="profile-grid"></dl>
    </div>
    <div class="card">
      <span class="card-title">Mon corps</span>
      <div class="body-container">
        <div class="seg-control" id="body-toggle">
          <button class="seg-btn active" data-view="front">Face</button>
          <button class="seg-btn" data-view="back">Dos</button>
        </div>
        <div class="body-model-wrapper" id="body-model-root">
          <div class="body-loading"><div class="spinner"></div></div>
        </div>
        <div class="body-legend" id="body-legend"></div>
      </div>
    </div>
    <div id="science-content"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="progression">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Progres</span>
    </button>
    <button class="tab-btn" data-tab="planning">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Planning</span>
    </button>
    <button class="tab-btn" data-tab="exercices">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Exercices</span>
    </button>
    <button class="tab-btn" data-tab="add">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Ajouter</span>
    </button>
    <button class="tab-btn" data-tab="science">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <span>Science</span>
    </button>
  </nav>

  <!-- PANELS -->
  <div class="panel-overlay" id="panel-overlay"></div>
  <div class="panel" id="panel"></div>
  <div class="toast" id="toast"></div>

  <datalist id="exercise-names"></datalist>
  <datalist id="muscle-groups"></datalist>

  <script src="data.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
